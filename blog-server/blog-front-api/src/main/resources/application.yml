server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  level:
    com.blog.common.mapper: WARN
    org.mybatis: WARN
    org.mybatis.spring: WARN

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.blog.common.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: front
      paths-to-match: /api/front/**
      packages-to-scan: com.blog.front.controller

jwt:
  secret: blog-secret-key-2024-this-is-a-very-long-secret-key-for-hs256
  expiration: 86400000

file:
  upload:
    path: ./uploads
    base-url: http://localhost:8080/uploads

oauth:
  github:
    client-id: Ov23li7NmORHeQwyTfpY
    client-secret: e91a18f13e5fff807b50e32fdb06bd7189976c66
    proxy-host: 127.0.0.1
    proxy-port: 7890
  gitee:
